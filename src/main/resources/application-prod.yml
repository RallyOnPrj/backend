spring:
  datasource:
    url: jdbc:postgresql://db:5432/${POSTGRES_DB}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none

server:
  forward-headers-strategy: framework

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://rallyon.kr,https://www.rallyon.kr,https://auth.rallyon.kr}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}

naver:
  search:
    local:
      enabled: ${NAVER_SEARCH_LOCAL_ENABLED:false}
      client-id: ${NAVER_SEARCH_CLIENT_ID:}
      client-secret: ${NAVER_SEARCH_CLIENT_SECRET:}
      base-url: ${NAVER_SEARCH_BASE_URL:https://openapi.naver.com}
