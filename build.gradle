plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.2'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.gumraze.rallyon'
version = '0.0.1-SNAPSHOT'
description = 'Badminton App Project RallyOn'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.flywaydb:flyway-core'
	implementation 'org.flywaydb:flyway-database-postgresql'

	// 최신 springdoc
	implementation "org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.1"

	// postgreSQL 의존성 추가
	implementation 'org.postgresql:postgresql'
	runtimeOnly 'com.h2database:h2'

	compileOnly 'org.projectlombok:lombok'
	developmentOnly 'org.springframework.boot:spring-boot-devtools'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testImplementation 'org.springframework.security:spring-security-test'
	testImplementation 'com.h2database:h2'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

	// JWT 구성 추가
	implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'
}

tasks.named('test') {
	useJUnitPlatform()

	// Suppress JDK warnings related to dynamic agent loading and CDS in tests.
	jvmArgs '-XX:+EnableDynamicAgentLoading', '-Xshare:off'

	doFirst {
		// Pre-install Byte Buddy agent to avoid Mockito self-attaching warnings.
		def byteBuddyAgentJar = configurations.testRuntimeClasspath.files.find { it.name.startsWith('byte-buddy-agent') }
		if (byteBuddyAgentJar != null) {
			jvmArgs "-javaagent:${byteBuddyAgentJar.absolutePath}"
		}
	}
}
